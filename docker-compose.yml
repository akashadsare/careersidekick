version: '3.9'
services:
  postgres:
    image: postgres:16
    container_name: careersidekick-postgres
    environment:
      POSTGRES_USER: careersidekick
      POSTGRES_PASSWORD: careersidekick
      POSTGRES_DB: careersidekick
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: careersidekick-redis
    ports:
      - '6379:6379'

volumes:
  postgres_data:
